---
repositories:
    - name: academy-services
      description: Get started with IAG services
      url: https://github.com/itential/academy-services.git
      reference: main
      tags:
        - demo
        - academy

services:

    - name: software-upgrade
      type: ansible-playbook
      description: Cisco IOS-XE Cat 8K install-mode upgrade
      playbooks:
        - software_upgrade.yml
      working-directory: ""
      repository: software-upgrade
      decorator: software-upgrade
      runtime:
        inventory:
            - dynamic_inventory.py
        config-file: ansible.cfg
        req-file: requirements.txt
        env:
            ANSIBLE_HOST_KEY_CHECKING: "false"
            ANSIBLE_STDOUT_CALLBACK: json

    - name: hello-ansible
      type: ansible-playbook
      description: Ansible hello world with two string variables
      # decorator: hello-ansible-decorator
      working-directory: hello-ansible
      playbooks:
        - hello-ansible.yml
      repository: academy-services
      tags:
        - demo
        - ansible
      # Optional extra-vars for testing:
      # first_string: First string to print (default: "Hello")
      # second_string: Second string to print (default: "World")
      # target_host: Target host (default: "127.0.0.1")

    - name: hello-python
      type: python-script
      description: Python hello world with two string variables
      # decorator: hello-python-decorator
      filename: hello-python.py
      working-directory: hello-python
      repository: academy-services
      tags:
        - demo
        - python
      # Optional environment variables for testing:
      # first_string: First string to print (default: "Hello")
      # second_string: Second string to print (default: "World")

    - name: hello-opentofu
      type: opentofu-plan
      description: OpenTOFU hello world with two string variables
      # decorator: hello-opentofu-decorator
      working-directory: hello-opentofu
      repository: academy-services
      tags:
        - demo
        - opentofu
      # Optional variables for testing:
      # first_string: First string to print (default: "Hello")
      # second_string: Second string to print (default: "World")

decorators:

    - name: software-upgrade
      schema:
        $id: software-upgrade-decorator
        $schema: https://json-schema.org/draft/2020-12/schema
        additionalProperties: false
        properties:
            binary:
                description: .bin filename to install, must exist in bootflash:images/ on the target device (e.g., c8000v-universalk9.17.15.03a.SPA.bin)
                type: string
        required:
            - binary
        type: object

